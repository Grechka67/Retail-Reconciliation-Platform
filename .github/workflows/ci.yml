name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Dummy secrets so config validation passes at import time.
      ADMIN_API_KEY: ci-not-a-real-key-000000000000
      KBANK_SMS_HMAC_SECRET: ci-not-a-real-secret-000000000000
      # Throwaway Postgres for the integration tests (the *_test name unlocks
      # the destructive truncate fixtures in tests/integration/conftest.py).
      DATABASE_URL: postgresql+psycopg://ot_admin:ci_local_test@localhost:5432/project_ot_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ot_admin
          POSTGRES_PASSWORD: ci_local_test
          POSTGRES_DB: project_ot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ot_admin -d project_ot_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
