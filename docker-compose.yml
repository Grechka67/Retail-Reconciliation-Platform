name: project-ot

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: ot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-project_ot}
      POSTGRES_USER: ${POSTGRES_USER:-ot_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      TZ: Asia/Bangkok
      PGTZ: Asia/Bangkok
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./metabase/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ot_admin} -d ${POSTGRES_DB:-project_ot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: ot-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ot_admin}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-project_ot}
      TZ: Asia/Bangkok
      LOYVERSE_API_TOKEN: ${LOYVERSE_API_TOKEN:-}
      KBANK_SMS_HMAC_SECRET: ${KBANK_SMS_HMAC_SECRET:?set KBANK_SMS_HMAC_SECRET in .env}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?set ADMIN_API_KEY in .env}
      LINE_NOTIFY_TOKEN: ${LINE_NOTIFY_TOKEN:-}
      ANOMALY_CASH_THRESHOLD_THB: ${ANOMALY_CASH_THRESHOLD_THB:-300}
      TRANSFER_MATCH_WINDOW_SECONDS: ${TRANSFER_MATCH_WINDOW_SECONDS:-600}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
      - ./sample-data:/sample-data:ro
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  metabase:
    image: metabase/metabase:v0.50.20
    container_name: ot-metabase
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-ot_admin}
      MB_DB_PASS: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      MB_DB_HOST: postgres
      MB_SITE_LOCALE: th
      MB_REPORT_TIMEZONE: Asia/Bangkok
      MB_ENCRYPTION_SECRET_KEY: ${METABASE_ENCRYPTION_KEY:?set METABASE_ENCRYPTION_KEY in .env}
      JAVA_TIMEZONE: Asia/Bangkok
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  n8n:
    image: n8nio/n8n:1.71.3
    container_name: ot-n8n
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-ot_admin}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      GENERIC_TIMEZONE: Asia/Bangkok
      TZ: Asia/Bangkok
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_RUNNERS_ENABLED: "true"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "false"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro

volumes:
  postgres_data:
  n8n_data:
